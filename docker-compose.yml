version: '3'

services:
  flask_app:
    image: flask_app_image
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      FLASK_APP: app.py
      FLASK_RUN_HOST: 0.0.0.0

